plugins {
	id 'org.springframework.boot' version '3.5.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'java'
	id 'idea'
	id 'eclipse'
}

group = 'com.hamvocke.spring-testing'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	runtimeOnly 'org.postgresql:postgresql'
	runtimeOnly 'com.h2database:h2'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'io.rest-assured:rest-assured:5.5.6'
	testImplementation 'org.wiremock:wiremock-jetty12:3.13.1'
	testImplementation 'org.seleniumhq.selenium:selenium-java'
	testImplementation 'au.com.dius.pact.consumer:junit5:4.6.17'
	testImplementation 'au.com.dius.pact.provider:junit5spring:4.6.17'
	testImplementation 'io.github.bonigarcia:webdrivermanager:6.3.2'
}

tasks.named('test') {
	useJUnitPlatform()
}
